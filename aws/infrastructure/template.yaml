AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: "CARE Compass - Trauma-Informed RAG Chatbot on AWS Lambda + S3"

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Deployment environment
  
  GoogleAPIKey:
    Type: String
    NoEcho: true
    Description: Google Generative AI API Key
  
  LambdaMemory:
    Type: Number
    Default: 1024
    MinValue: 128
    MaxValue: 10240
    Description: Lambda function memory in MB
  
  LambdaTimeout:
    Type: Number
    Default: 300
    MinValue: 30
    MaxValue: 900
    Description: Lambda function timeout in seconds

Globals:
  Function:
    Timeout: !Ref LambdaTimeout
    MemorySize: !Ref LambdaMemory
    Runtime: python3.11
    Environment:
      Variables:
        GOOGLE_API_KEY: !Ref GoogleAPIKey
        S3_DOCUMENTS_BUCKET: !Ref DocumentsBucket
        S3_PROCESSED_BUCKET: !Ref ProcessedBucket
        S3_VECTORDB_BUCKET: !Ref VectorDBBucket
        ENVIRONMENT: !Ref Environment

Resources:
  # ==================== S3 BUCKETS ====================
  
  RootLoggingBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "care-compass-root-logs-${AWS::AccountId}-${Environment}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LoggingConfiguration:
        DestinationBucketName: !Sub "care-compass-root-logs-${AWS::AccountId}-${Environment}"
        LogFilePrefix: root-logs/
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: CareCompass
  
  LoggingBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "care-compass-logs-${AWS::AccountId}-${Environment}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LoggingConfiguration:
        DestinationBucketName: !Ref RootLoggingBucket
        LogFilePrefix: logging-bucket/
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: CareCompass
  
  DocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "care-compass-documents-${AWS::AccountId}-${Environment}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LoggingConfiguration:
        DestinationBucketName: !Ref LoggingBucket
        LogFilePrefix: documents/
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: CareCompass

  ProcessedBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "care-compass-processed-${AWS::AccountId}-${Environment}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LoggingConfiguration:
        DestinationBucketName: !Ref LoggingBucket
        LogFilePrefix: processed/
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: CareCompass

  VectorDBBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "care-compass-vectordb-${AWS::AccountId}-${Environment}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LoggingConfiguration:
        DestinationBucketName: !Ref LoggingBucket
        LogFilePrefix: vectordb/
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: CareCompass

  # ==================== IAM ROLE ====================
  
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  LambdaS3AccessPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: S3Access
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:ListBucket
            Resource:
              - !GetAtt DocumentsBucket.Arn
              - !Sub "${DocumentsBucket.Arn}/*"
              - !GetAtt ProcessedBucket.Arn
              - !Sub "${ProcessedBucket.Arn}/*"
              - !GetAtt VectorDBBucket.Arn
              - !Sub "${VectorDBBucket.Arn}/*"
      Roles:
        - !Ref LambdaExecutionRole

  # ==================== LAMBDA FUNCTION ====================
  
  CareBotFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "care-compass-${Environment}"
      CodeUri: ../lambda/
      Handler: lambda_handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      EphemeralStorage:
        Size: 10240  # 10 GB for ChromaDB and dependencies
      Architectures:
        - x86_64
      Events:
        ChatApi:
          Type: Api
          Properties:
            RestApiId: !Ref CareBotApi
            Path: /chat
            Method: POST
        ClearApi:
          Type: Api
          Properties:
            RestApiId: !Ref CareBotApi
            Path: /clear
            Method: POST
        StatsApi:
          Type: Api
          Properties:
            RestApiId: !Ref CareBotApi
            Path: /stats
            Method: GET
        HealthApi:
          Type: Api
          Properties:
            RestApiId: !Ref CareBotApi
            Path: /health
            Method: GET
        CategoriesApi:
          Type: Api
          Properties:
            RestApiId: !Ref CareBotApi
            Path: /categories
            Method: GET
        CorsApi:
          Type: Api
          Properties:
            RestApiId: !Ref CareBotApi
            Path: /{proxy+}
            Method: OPTIONS
      Tags:
        Environment: !Ref Environment
        Project: CareCompass

  # ==================== API GATEWAY ====================
  
  CareBotApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "care-compass-api-${Environment}"
      StageName: !Ref Environment
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
      Tags:
        Environment: !Ref Environment
        Project: CareCompass

  # ==================== CLOUDWATCH ALARMS ====================
  
  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "care-compass-${Environment}-errors"
      AlarmDescription: Alert when Lambda errors occur
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Sub "arn:aws:sns:${AWS::Region}:${AWS::AccountId}:care-compass-alerts"
      Dimensions:
        - Name: FunctionName
          Value: !Ref CareBotFunction

  LambdaDurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "care-compass-${Environment}-duration"
      AlarmDescription: Alert when Lambda duration is high
      MetricName: Duration
      Namespace: AWS/Lambda
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 10000  # 10 seconds in milliseconds
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Sub "arn:aws:sns:${AWS::Region}:${AWS::AccountId}:care-compass-alerts"
      Dimensions:
        - Name: FunctionName
          Value: !Ref CareBotFunction

Outputs:
  CareBotApiEndpoint:
    Description: API Gateway endpoint for CARE Bot
    Value: !Sub "https://${CareBotApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"
    Export:
      Name: !Sub "${AWS::StackName}-ApiEndpoint"

  CareBotFunctionArn:
    Description: ARN of CARE Bot Lambda function
    Value: !GetAtt CareBotFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-FunctionArn"

  DocumentsBucketName:
    Description: S3 bucket for documents
    Value: !Ref DocumentsBucket
    Export:
      Name: !Sub "${AWS::StackName}-DocumentsBucket"

  ProcessedBucketName:
    Description: S3 bucket for processed documents
    Value: !Ref ProcessedBucket
    Export:
      Name: !Sub "${AWS::StackName}-ProcessedBucket"

  VectorDBBucketName:
    Description: S3 bucket for vector database backups
    Value: !Ref VectorDBBucket
    Export:
      Name: !Sub "${AWS::StackName}-VectorDBBucket"
