AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: "CARE Compass - Trauma-Informed RAG Chatbot on AWS Lambda (Container Image)"

Parameters:
  ImageUri:
    Type: String
    Description: ECR image URI for Lambda container

  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Deployment environment

  GCPProjectId:
    Type: String
    Description: Google Cloud Project ID for Vertex AI

  GCPLocation:
    Type: String
    Default: us-central1
    Description: GCP region for Vertex AI

  GCPCredentialsBase64:
    Type: String
    NoEcho: true
    Description: Base64-encoded GCP service account JSON key

  LambdaMemory:
    Type: Number
    Default: 512
    MinValue: 128
    MaxValue: 10240
    Description: Lambda function memory in MB

  LambdaTimeout:
    Type: Number
    Default: 300
    MinValue: 30
    MaxValue: 900
    Description: Lambda function timeout in seconds

  SupabaseJwtSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: Supabase JWT secret for authentication (legacy HS256 fallback)

  SupabaseUrl:
    Type: String
    Default: ""
    Description: Supabase project URL (e.g. https://xxx.supabase.co)


Globals:
  Function:
    Timeout: !Ref LambdaTimeout
    MemorySize: !Ref LambdaMemory

Resources:
  # ==================== DYNAMODB ====================

  ConversationHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "care-compass-conversations-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: N
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: CareCompass

  ResponseCacheTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "care-compass-response-cache-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: query_hash
          AttributeType: S
      KeySchema:
        - AttributeName: query_hash
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: CareCompass

  # ==================== IAM ROLE ====================

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  LambdaS3AccessPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: S3Access
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:ListBucket
            Resource:
              - !Sub "arn:aws:s3:::care-compass-documents-${AWS::AccountId}-${Environment}"
              - !Sub "arn:aws:s3:::care-compass-documents-${AWS::AccountId}-${Environment}/*"
              - !Sub "arn:aws:s3:::care-compass-vectordb-${AWS::AccountId}-${Environment}"
              - !Sub "arn:aws:s3:::care-compass-vectordb-${AWS::AccountId}-${Environment}/*"
              - !Sub "arn:aws:s3:::care-compass-logs-${AWS::AccountId}-${Environment}"
              - !Sub "arn:aws:s3:::care-compass-logs-${AWS::AccountId}-${Environment}/*"
      Roles:
        - !Ref LambdaExecutionRole

  LambdaVoicePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: VoiceAccess
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - polly:SynthesizeSpeech
            Resource: "*"
          - Effect: Allow
            Action:
              - transcribe:StartTranscriptionJob
              - transcribe:GetTranscriptionJob
              - transcribe:DeleteTranscriptionJob
            Resource: "*"
      Roles:
        - !Ref LambdaExecutionRole

  LambdaDynamoDBAccessPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: DynamoDBAccess
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:GetItem
              - dynamodb:PutItem
              - dynamodb:DeleteItem
              - dynamodb:Query
              - dynamodb:BatchWriteItem
              - dynamodb:Scan
            Resource:
              - !GetAtt ConversationHistoryTable.Arn
              - !GetAtt ResponseCacheTable.Arn
      Roles:
        - !Ref LambdaExecutionRole

  # ==================== LAMBDA FUNCTION ====================

  CareBotFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "care-compass-${Environment}"
      PackageType: Image
      ImageUri: !Ref ImageUri
      Role: !GetAtt LambdaExecutionRole.Arn
      EphemeralStorage:
        Size: 1024
      Architectures:
        - x86_64
      Environment:
        Variables:
          GCP_PROJECT_ID: !Ref GCPProjectId
          GCP_LOCATION: !Ref GCPLocation
          GCP_CREDENTIALS_BASE64: !Ref GCPCredentialsBase64
          S3_DOCUMENTS_BUCKET: !Sub "care-compass-documents-${AWS::AccountId}-${Environment}"
          S3_VECTORDB_BUCKET: !Sub "care-compass-vectordb-${AWS::AccountId}-${Environment}"
          S3_LOGS_BUCKET: !Sub "care-compass-logs-${AWS::AccountId}-${Environment}"
          DYNAMODB_TABLE_NAME: !Ref ConversationHistoryTable
          SUPABASE_JWT_SECRET: !Ref SupabaseJwtSecret
          SUPABASE_URL: !Ref SupabaseUrl
          ENVIRONMENT: !Ref Environment
      Events:
        ChatApi:
          Type: Api
          Properties:
            RestApiId: !Ref CareBotApi
            Path: /chat
            Method: POST
        ClearApi:
          Type: Api
          Properties:
            RestApiId: !Ref CareBotApi
            Path: /clear
            Method: POST
        StatsApi:
          Type: Api
          Properties:
            RestApiId: !Ref CareBotApi
            Path: /stats
            Method: GET
        HealthApi:
          Type: Api
          Properties:
            RestApiId: !Ref CareBotApi
            Path: /health
            Method: GET
        CategoriesApi:
          Type: Api
          Properties:
            RestApiId: !Ref CareBotApi
            Path: /categories
            Method: GET
        VoiceChatApi:
          Type: Api
          Properties:
            RestApiId: !Ref CareBotApi
            Path: /voice-chat
            Method: POST
        CorsApi:
          Type: Api
          Properties:
            RestApiId: !Ref CareBotApi
            Path: /{proxy+}
            Method: OPTIONS
      Tags:
        Environment: !Ref Environment
        Project: CareCompass

  # ==================== API GATEWAY ====================

  CareBotApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "care-compass-api-${Environment}"
      StageName: !Ref Environment
      BinaryMediaTypes:
        - "multipart/form-data"
        - "audio/*"
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,X-Session-ID'"
        AllowOrigin: "'*'"
      Tags:
        Environment: !Ref Environment
        Project: CareCompass

Outputs:
  CareBotApiEndpoint:
    Description: API Gateway endpoint for CARE Bot
    Value: !Sub "https://${CareBotApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"
    Export:
      Name: !Sub "${AWS::StackName}-ApiEndpoint"

  CareBotFunctionArn:
    Description: ARN of CARE Bot Lambda function
    Value: !GetAtt CareBotFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-FunctionArn"

  ConversationHistoryTableName:
    Description: DynamoDB table for conversation history
    Value: !Ref ConversationHistoryTable
    Export:
      Name: !Sub "${AWS::StackName}-ConversationHistoryTable"