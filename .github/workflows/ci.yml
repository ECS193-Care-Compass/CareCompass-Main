name: CI - Test & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ==================== PYTHON BACKEND ====================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Create test .env
        run: |
          echo "GOOGLE_API_KEY=test_key" >> .env
          echo "AWS_REGION=us-east-1" >> .env
          echo "ENVIRONMENT=test" >> .env
          echo "MODEL_NAME=gemini-2.5-flash" >> .env
          echo "TEMPERATURE=0.7" >> .env
          echo "TOP_K=3" >> .env

      - name: Run basic import tests
        run: |
          python -c "from src.generation.llm_handler import LLMHandler; print('LLMHandler OK')"
          python -c "from src.embeddings.vector_store import VectorStore; print('VectorStore OK')"
          python -c "from src.safety.crisis_detector import CrisisDetector; print('CrisisDetector OK')"
          python -c "from src.utils.user_manager import UserManagerWithS3; print('UserManager OK')"

      - name: Run pytest (if tests exist)
        run: |
          if [ -d "tests" ] && [ "$(ls -A tests/*.py 2>/dev/null)" ]; then
            pytest tests/ -v --tb=short || true
          else
            echo "No tests found in tests/ directory"
          fi

  # ==================== PYTHON LINTING ====================
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linters
        run: |
          pip install ruff

      - name: Run Ruff linter
        run: |
          ruff check src/ --ignore E501,F401 || true

  # ==================== FRONTEND BUILD ====================
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: chatbot-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: chatbot-frontend
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Create frontend .env
        working-directory: chatbot-frontend
        run: |
          echo "VITE_API_BASE_URL=http://localhost:8000" >> .env

      - name: Build frontend
        working-directory: chatbot-frontend
        run: |
          # Skip typecheck for now, just build the Vite output
          npx electron-vite build || echo "Build had issues"

      - name: Lint frontend
        working-directory: chatbot-frontend
        run: npm run lint 2>&1 || echo "Lint warnings found"

  # ==================== LAMBDA BUILD ====================
  lambda-build:
    name: Lambda Build Check
    runs-on: ubuntu-latest
    continue-on-error: true  # Don't fail CI on Lambda build issues
    env:
      AWS_DEFAULT_REGION: us-east-1
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Validate SAM template
        run: |
          sam validate -t aws/infrastructure/template.yaml --region us-east-1

      - name: Build Lambda (dry run)
        run: |
          sam build -t aws/infrastructure/template.yaml --region us-east-1 || echo "Build failed - Lambda structure may need attention"
